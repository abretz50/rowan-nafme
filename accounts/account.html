<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script defer src="/assets/js/identity.js"></script>
</head>
<body>
  <main>
    <a href="/index.html">← Back to Home</a>
    <h1>My Account</h1>

    <section aria-labelledby="profile">
      <h2 id="profile">Profile</h2>
      <p><strong>Name:</strong> <span id="user-name"></span></p>
      <p><strong>Email:</strong> <span id="user-email"></span></p>
      <div>
        <img id="profile-pic" src="/images/ui/placeholder.png" alt="Profile picture" width="120">
        <input type="file" id="upload-photo" accept="image/*">
      </div>
    </section>

    <section aria-labelledby="security">
      <h2 id="security">Security</h2>
      <p id="security-help" aria-live="polite"></p>
      <form id="password-form">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" autocomplete="new-password">
        <button type="submit" id="change-password">Change Password</button>
      </form>
      <button id="recovery-email">Password Recovery</button>
    </section>

    <section aria-labelledby="eboard-tools">
      <h2 id="eboard-tools" style="display:none;">E-Board Tools</h2>
      <p id="eboard-note" style="display:none;">You have E-Board access.</p>
      <p>
        <button id="btn-points" type="button" hidden>Points Manager</button>
        <button id="btn-events" type="button" hidden>Event Manager</button>
      </p>
    </section>
  </main>
</body>
</html>
