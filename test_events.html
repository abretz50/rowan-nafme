<!DOCTYPE html>
<html>
<head>
  <title>Test Events</title>
</head>
<body>
  <h1>Upcoming Events</h1>
  <div id="events"></div>

  <script>
    fetch('/.netlify/functions/get_events')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('events');
        data.forEach(e => {
          const div = document.createElement('div');
          div.innerHTML = `<h3>${e.title}</h3><p>${e.date}</p><p>${e.description}</p>`;
          container.appendChild(div);
        });
      })
      .catch(err => {
        document.getElementById('events').textContent = 'Error loading events.';
        console.error(err);
      });
  </script>
</body>
</html>
