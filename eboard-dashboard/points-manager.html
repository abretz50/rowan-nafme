<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Points Manager</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script defer src="/assets/js/points-manager.js"></script>
</head>
<body>
  <main>
    <p><a href="/accounts/account.html">← Back to My Account</a></p>
    <h1>Points Manager</h1>

    <section>
      <h2>Leaderboard</h2>
      <table id="leaderboard" border="1" cellpadding="6" cellspacing="0">
        <thead>
          <tr><th>#</th><th>Name</th><th>Points</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="3">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <section>
      <h2>Adjust Points (by Name)</h2>
      <form id="inc-form">
        <label>Name <input id="inc-name" type="text" required placeholder="Exact full name"></label>
        <label>Change by <input id="inc-amount" type="number" required value="1"></label>
        <button type="submit">Increment / Decrement</button>
      </form>
      <form id="set-form" style="margin-top:12px;">
        <label>Name <input id="set-name" type="text" required placeholder="Exact full name"></label>
        <label>Set to <input id="set-points" type="number" required value="0"></label>
        <button type="submit">Set Points</button>
      </form>
      <p style="margin-top:8px;">
        Note: Names are matched exactly (case-insensitive). If multiple users share the same name,
        you’ll be asked to make it unique.
      </p>
    </section>
  </main>
</body>
</html>
